version: "3"

networks:
  hadoop_lab_net:
    name: hadoop_lab_net
    driver: bridge

services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: namenode
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      - CLUSTER_NAME=test
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_blocksize=2097152
      - HDFS_CONF_dfs_replication=1
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - hadoop_lab_net

  datanode1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: datanode1
    depends_on:
      - namenode
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - hadoop_lab_net