services:
  spark-master:
    image: bitnamilegacy/spark:3.5.0
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./data:/opt/spark/data
      - ./src:/opt/spark/src
      - ./scripts:/opt/spark/scripts

  spark-worker:
    image: bitnamilegacy/spark:3.5.0
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_CORES=2
    volumes:
      - ./data:/opt/spark/data
      - ./src:/opt/spark/src
    depends_on:
      - spark-master

  mlflow:
    image: bitnamilegacy/mlflow:2.13.0
    entrypoint: []
    working_dir: /mlflow
    ports:
      - "${MLFLOW_HOST_PORT:-5050}:5000"
    volumes:
      - ./mlflow_data:/mlflow
    command:
      - mlflow
      - server
      - --host
      - "0.0.0.0"
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --default-artifact-root
      - /mlflow/artifacts

  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /opt/spark
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_HOST_PORT=${MLFLOW_HOST_PORT:-5050}
      - DELTA_LAKE_PATH=/opt/spark/data/delta
      - FLIGHT_DATA_CSV=/opt/spark/data/flight_data_2018_2024.csv
      - PYTHONPATH=/opt/spark
    volumes:
      - ./data:/opt/spark/data
      - ./src:/opt/spark/src
      - ./scripts:/opt/spark/scripts
      - ./logs:/opt/spark/logs
      # Тот же путь, что у mlflow --default-artifact-root: клиент пишет артефакты локально в file:// URI.
      - ./mlflow_data:/mlflow
    depends_on:
      - spark-master
      - spark-worker
      - mlflow